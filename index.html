<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Générateur d'Images IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.15);
    --accent: #c8f064;
    --accent-dim: rgba(200,240,100,0.12);
    --text: #f0f0f0;
    --muted: #888;
    --radius: 14px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeDown 0.6s ease both;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #fff 40%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }

  header p {
    color: var(--muted);
    font-size: 0.95rem;
    margin-top: 0.5rem;
    font-weight: 300;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    width: 100%;
    max-width: 680px;
    animation: fadeUp 0.5s ease both;
  }

  .card + .card { margin-top: 1rem; }

  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
  }

  textarea, input[type="text"], select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea { resize: vertical; line-height: 1.6; }
  textarea:focus, input:focus, select:focus { border-color: var(--accent); }

  select option { background: #1c1c28; }

  .grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-top: 1rem;
  }

  @media (max-width: 540px) {
    .grid-3 { grid-template-columns: 1fr 1fr; }
  }

  .generate-btn {
    width: 100%;
    padding: 1rem;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    margin-top: 1.5rem;
    transition: opacity 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .generate-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .generate-btn:active { transform: scale(0.98); }
  .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .status {
    display: none;
    text-align: center;
    padding: 2rem;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }

  .result { display: none; margin-top: 1.5rem; animation: fadeUp 0.4s ease both; }

  .result img {
    width: 100%;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    display: block;
  }

  .result-actions {
    display: flex;
    gap: 10px;
    margin-top: 1rem;
  }

  .btn-secondary {
    flex: 1;
    padding: 0.7rem;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .btn-secondary:hover { border-color: var(--border-hover); background: rgba(255,255,255,0.05); }

  .error {
    display: none;
    margin-top: 1rem;
    padding: 0.8rem 1rem;
    background: rgba(255, 80, 80, 0.1);
    border: 1px solid rgba(255,80,80,0.25);
    border-radius: 10px;
    font-size: 0.88rem;
    color: #ff8080;
  }

  .tip {
    text-align: center;
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 0.75rem;
  }

  .tip kbd {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 0.75rem;
    color: var(--text);
  }

  .badge {
    display: inline-block;
    background: var(--accent-dim);
    color: var(--accent);
    border-radius: 6px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 2px 8px;
    margin-left: 6px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:none; } }
</style>
</head>
<body>

<header>
  <h1>Générateur d'Images IA</h1>
  <p>Propulsé par Pollinations AI · Photos ultra-réalistes</p>
</header>

<div class="card" style="max-width:680px; width:100%;">
  <label>Décris ton image <span class="badge">PROMPT</span></label>
  <textarea id="prompt" rows="4" placeholder="Ex: Une femme africaine élégante marchant dans les rues de Paris au coucher du soleil, photo ultra-réaliste, bokeh, Canon 5D Mark IV, 85mm f/1.4…"></textarea>

  <div class="grid-3" style="margin-top:1.2rem;">
    <div>
      <label>Modèle</label>
      <select id="model">
        <option value="flux-realism">Flux Realism</option>
        <option value="flux">Flux</option>
        <option value="flux-pro">Flux Pro</option>
        <option value="realistic-vision">Realistic Vision</option>
      </select>
    </div>
    <div>
      <label>Format</label>
      <select id="ratio">
        <option value="1024x1024">Carré (1:1)</option>
        <option value="1280x720">Paysage (16:9)</option>
        <option value="720x1280">Portrait (9:16)</option>
        <option value="1024x768">Photo (4:3)</option>
      </select>
    </div>
    <div>
      <label>Prompt auto</label>
      <select id="enhance">
        <option value="true">Amélioré ✨</option>
        <option value="false">Tel quel</option>
      </select>
    </div>
  </div>

  <div style="margin-top:1.2rem;">
    <label>Éléments à éviter <span class="badge">NÉGATIF</span></label>
    <input type="text" id="negative" placeholder="cartoon, flou, déformé, pixelisé, watermark…" />
  </div>

  <button class="generate-btn" id="genBtn" onclick="generateImage()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M12 8v4M10 10h4"/></svg>
    Générer l'image
  </button>

  <p class="tip">Astuce : appuie sur <kbd>Ctrl</kbd> + <kbd>Entrée</kbd> pour générer rapidement</p>

  <div class="status" id="status">
    <div class="spinner"></div>
    Génération en cours, patiente quelques secondes…
  </div>

  <div class="error" id="error"></div>

  <div class="result" id="result">
    <img id="generatedImg" src="" alt="Image générée" />
    <div class="result-actions">
      <button class="btn-secondary" onclick="downloadImage()">⬇ Télécharger</button>
      <button class="btn-secondary" onclick="generateImage()">↻ Régénérer</button>
    </div>
  </div>
</div>

<script>
  let currentUrl = '';

  async function generateImage() {
    const prompt = document.getElementById('prompt').value.trim();
    if (!prompt) { showError('Merci d\'écrire une description.'); return; }

    const [w, h] = document.getElementById('ratio').value.split('x');
    const model = document.getElementById('model').value;
    const enhance = document.getElementById('enhance').value;
    const negative = document.getElementById('negative').value.trim();
    const seed = Math.floor(Math.random() * 999999);

    document.getElementById('status').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    document.getElementById('error').style.display = 'none';
    document.getElementById('genBtn').disabled = true;

    let url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=${w}&height=${h}&model=${model}&enhance=${enhance}&seed=${seed}&nologo=true`;
    if (negative) url += `&negative=${encodeURIComponent(negative)}`;
    currentUrl = url;

    try {
      await new Promise((res, rej) => {
        const img = document.getElementById('generatedImg');
        img.onload = res;
        img.onerror = rej;
        img.src = url;
      });
      document.getElementById('status').style.display = 'none';
      document.getElementById('result').style.display = 'block';
    } catch {
      showError('Erreur lors de la génération. Vérifie ta connexion ou réessaie.');
      document.getElementById('status').style.display = 'none';
    } finally {
      document.getElementById('genBtn').disabled = false;
    }
  }

  function downloadImage() {
    if (!currentUrl) return;
    const a = document.createElement('a');
    a.href = currentUrl;
    a.download = 'image-ia.jpg';
    a.target = '_blank';
    a.click();
  }

  function showError(msg) {
    const el = document.getElementById('error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  document.getElementById('prompt').addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') generateImage();
  });
</script>
</body>
</html>
